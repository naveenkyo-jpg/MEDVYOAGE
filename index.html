/* ---------- AI agent layer ---------- */
async function callClaude(prompt,useWeb=false){
  const body={model:"claude-sonnet-4-6",max_tokens:1000,messages:[{role:"user",content:prompt}]};
  if(useWeb)body.tools=[{type:"web_search_20250305",name:"web_search"}];
  const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
  if(!r.ok)throw new Error("api "+r.status);
  const d=await r.json();
  return (d.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("\n");
}
function extractJSON(text){
  if(!text)return null;let t=text.replace(/```json/gi,"").replace(/```/g,"").trim();
  const open=t.search(/[\[{]/);if(open<0)return null;
  const oc=t[open],cc=oc==="["?"]":"}";let depth=0,end=-1,inStr=false,esc=false;
  for(let i=open;i<t.length;i++){const ch=t[i];
    if(inStr){if(esc)esc=false;else if(ch==="\\")esc=true;else if(ch==='"')inStr=false;continue;}
    if(ch==='"')inStr=true;else if(ch===oc)depth++;else if(ch===cc){depth--;if(depth===0){end=i;break;}}}
  if(end<0)return null;try{return JSON.parse(t.slice(open,end+1));}catch{return null;}
}
function fallbackPlan(origin,p){return{
  flights:{route:`${origin} → ${p.city} (${hubFor(p.country)})`,hub:hubFor(p.country),typicalHours:"varies",note:"Book a flexible-return fare; recovery dates can shift."},
  visa:{type:"Tourist / medical visa (verify per nationality)",medicalVisa:`${p.country} commonly offers a medical visa with a hospital invitation letter.`,docs:["Passport (6+ months validity)","Hospital invitation letter","Proof of funds","Return ticket"]},
  permissions:["Fit-to-fly clearance from treating doctor before return","Post-surgery flying often restricted 1–2 weeks","Carry a medication letter for customs"],
  stay:{totalDays:"10–21 days",hospitalDays:"2–7 days",recovery:"Plan local recovery before flying"},
  contacts:[{role:"International patient office",detail:`${p.name} — request a coordinator`},{role:"Your embassy/consulate",detail:`${origin} mission in ${p.country}`},{role:"Travel insurer",detail:"Confirm medical-tourism coverage"}],
  checklist:["Get written, itemised quote","Request surgeon credentials & case volume","Confirm accreditation","Arrange interpreter if needed","Book recovery stay near hospital","Confirm aftercare & home follow-up"]};}

const mask=(v)=>{const s=String(v);return s.length<=4?"••••":"•".repeat(Math.max(4,s.length-2))+s.slice(-2);};

/* ---------------- Control console ---------------- */
function Control({treat,setTreat,region,setRegion,deploy,running,auto,setAuto}){

const AGENT_META=[{k:"discover",nm:"Scout",ro:"Finds hospitals & surgeons",c:"#0E8F84",g:"⌖"},{k:"rate",nm:"Appraiser",ro:"Aggregates ratings & refs",c:"#D8A23E",g:"★"},{k:"cost",nm:"Quote",ro:"Estimates cost & savings",c:"#3B7DD8",g:"$"},{k:"travel",nm:"Navigator",ro:"Flights, routes & timing",c:"#E8623D",g:"✈"},{k:"visa",nm:"Gatekeeper",ro:"Visa, permits & fit-to-fly",c:"#7C5BD8",g:"⎙"},{k:"concierge",nm:"Concierge",ro:"Contacts & aftercare",c:"#1F9E78",g:"☎"}];
function AgentGrid({agents}){return(<div className="fleet">{AGENT_META.map(a=>{const b=!!agents[a.k];return(<div key={a.k} className={"agent"+(b?" busy":"")}><div className="top"><div className="aorb" style={{background:a.c}}>{a.g}</div><span className={"status"+(b?" busy":"")}>{b?"working":"idle"}</span></div><div className="nm">{a.nm}</div><div className="ro">{a.ro}</div></div>);})}</div>);}
function TelemetryLog({log,logRef}){return(<div className="log" ref={logRef}>{log.length===0&&<div style={{color:"#5C7E79"}}>// fleet idle — deploy agents to begin streaming</div>}{log.map((l,i)=>(<div className="ln" key={i}><span className="t">{l.t}</span><span className={"tag"+(l.kind?" "+l.kind:"")}>[{l.tag}]</span><span style={{color:"#CFE8E3"}}>{l.msg}</span></div>))}</div>);}

    <hr className="sep"/><div className="eyebrow" style={{marginBottom:8}}>References & sources</div>
    {(p.weblinks&&p.weblinks.length)?p.weblinks.map((r,i)=>(<div className="srclink" key={i}><span>{r.label||r.url}</span>{r.url&&<a href={r.url} target="_blank" rel="noreferrer">open ↗</a>}</div>)):(p.refs||[]).map((r,i)=>(<div className="srclink" key={i}><span>{r}</span><span className="muted" style={{fontSize:11}}>reference</span></div>))}

/* ---------------- Vault (patient PHI) ---------------- */
function Vault({me,setPatients,logAudit}){
  const [shown,setShown]=useState({});
  const reveal=(i,k)=>{setShown(s=>({...s,[i]:!s[i]}));if(!shown[i])logAudit("revealed field",`${k} (own record)`,3);};
  const toggleConsent=(idx)=>{setPatients(ps=>ps.map((p,i)=>i===0?{...p,consents:p.consents.map((c,j)=>j===idx?{...c,on:!c.on}:c)}:p));logAudit("consent changed",me.consents[idx].to,2);};
  return (<div className="grid" style={{gridTemplateColumns:"1fr"}}>
    <div className="banner sec">{I.lock}<span><b>Encrypted vault (simulated).</b> Fields are masked by default; revealing one is recorded in the audit log. This prototype does not provide real cryptographic protection — don't store real PHI. Production needs a HIPAA/Privacy-Act-eligible backend with a signed BAA.</span></div>
    <div className="card" style={{padding:18}}>
      <div className="row" style={{justifyContent:"space-between",marginBottom:6}}><div><div className="eyebrow">Record · {me.mrn}</div><div className="h2" style={{fontSize:17}}>Personal health information</div></div>
        <div className="row" style={{gap:6}}>{LV.map(([t,,n])=><span key={t} className={`lv lv${n}`}>{t}</span>)}</div></div>
      <div style={{marginTop:12}}>{me.fields.map((f,i)=>(
        <div className="kv" key={i}><span className="k">{f.k}</span><span className={`lv lv${f.lv}`}>{LV[f.lv][0]}</span>
          <span className="v">{shown[i]?f.v:mask(f.v)}</span>
          <button className="reveal" onClick={()=>reveal(i,f.k)}>{shown[i]?"hide":"reveal"}</button></div>))}</div>
    </div>
    <div className="card" style={{padding:18}}>
      <div className="eyebrow" style={{marginBottom:4}}>Consent</div><div className="h2" style={{fontSize:16,marginBottom:10}}>Who can see your data</div>
      {me.consents.length===0&&<div className="muted" style={{fontSize:13}}>No sharing consents yet.</div>}
      {me.consents.map((c,i)=>(<div className="kv" key={i}><span className="k" style={{width:160}}>{c.to}</span><span className="v" style={{fontFamily:"inherit"}}>{c.scope}</span>
        <button className={"btn sm "+(c.on?"":"ghost")} onClick={()=>toggleConsent(i)}>{c.on?"Sharing ✓":"Share"}</button></div>))}
      <div className="muted" style={{fontSize:11,marginTop:8}}>You can withdraw consent at any time; changes are logged.</div>
    </div>
  </div>);
}

/* ---------------- Admin records ---------------- */
function AdminRecords({patients,logAudit}){
  const [open,setOpen]=useState(null);const [shown,setShown]=useState({});
  const view=p=>{setOpen(p);setShown({});logAudit("opened record",`${p.name} · ${p.mrn}`,3);};
  const reveal=(i,k,p)=>{setShown(s=>({...s,[i]:!s[i]}));if(!shown[i])logAudit("revealed PHI",`${p.name} · ${k}`,3);};
  return (<div className="grid" style={{gridTemplateColumns:"1fr"}}>
    <div className="banner sec">{I.shield}<span><b>Access-controlled (RBAC).</b> Every open & reveal here is written to the audit log with a P3 classification. Minimum-necessary access applies in production. Demo data only.</span></div>
    <div className="card" style={{padding:0,overflow:"auto"}}>
      <table className="tbl"><thead><tr><th>Subscriber</th><th>MRN</th><th>Region</th><th>Plan</th><th>Status</th><th></th></tr></thead>
        <tbody>{patients.map(p=>(<tr key={p.id}><td><b>{p.name}</b></td><td className="mono" style={{fontSize:12}}>{p.mrn}</td><td>{p.region}</td><td><span className="chip gray">{PLANS.find(x=>x.id===p.plan)?.name||p.plan}</span></td><td>{p.status}</td><td style={{textAlign:"right"}}><button className="btn ghost sm" onClick={()=>view(p)}>{I.lock} Open</button></td></tr>))}</tbody></table>
    </div>
    {open&&(<><div className="scrim" onClick={()=>setOpen(null)}/><div className="drawer"><div className="dwrap">
      <div className="row" style={{justifyContent:"space-between"}}><span className="eyebrow">Patient record · {open.mrn}</span><button className="btn ghost sm" onClick={()=>setOpen(null)}>{I.x}</button></div>
      <div className="h2" style={{margin:"8px 0 2px"}}>{open.name}</div><div className="muted" style={{fontSize:12.5}}>{open.region} · {PLANS.find(x=>x.id===open.plan)?.name}</div>
      <div className="banner sec" style={{margin:"14px 0"}}>{I.lock}<span>Reveals are audited. Justify access under minimum-necessary.</span></div>
      {open.fields.map((f,i)=>(<div className="kv" key={i}><span className="k">{f.k}</span><span className={`lv lv${f.lv}`}>{LV[f.lv][0]}</span><span className="v">{shown[i]?f.v:mask(f.v)}</span><button className="reveal" onClick={()=>reveal(i,f.k,open)}>{shown[i]?"hide":"reveal"}</button></div>))}
    </div></div></>)}
  </div>);
}

/* ---------------- Donor registry ---------------- */

    </div>
  </div>);
}

/* ---------------- Complaints ---------------- */

  return (<div className="grid" style={{gridTemplateColumns:"1fr"}}>

    </div>
    <div className="card" style={{padding:0,overflow:"auto"}}>
      <table className="tbl"><thead><tr><th>ID</th><th>From</th><th>Category</th><th>Severity</th><th>Filed</th><th>Status</th><th></th></tr></thead>
        <tbody>{complaints.map(c=>(<tr key={c.id}><td className="mono" style={{fontSize:11}}>{c.id}</td><td>{c.patient}</td><td>{c.category}</td>
          <td><span className={"chip "+(c.severity==="High"?"sig":c.severity==="Medium"?"amber":"gray")}>{c.severity}</span></td><td className="muted">{c.when}</td>
          <td><span className="chip gray">{c.status}</span></td>
          <td style={{textAlign:"right"}}><select value={c.status} onChange={e=>setStatus(c.id,e.target.value)} style={{width:130,padding:"6px 8px",fontSize:12}}>{["Open","In review","Resolved"].map(s=><option key={s}>{s}</option>)}</select></td></tr>))}</tbody></table>
    </div>
  </div>);
}

/* ---------------- Compliance center ---------------- */
function Compliance({conns,audit}){
  const controls=[["Role-based access control","Patient vs admin interfaces with scoped views","ok"],["Audit logging","Every record open/reveal/consent change recorded","ok"],["Encryption in transit","API calls over HTTPS/TLS","ok"],["Data classification","P0–P3 sensitivity tags on every field","ok"],["Consent management","Patient-controlled sharing toggles","ok"],["Encryption at rest","Requires HIPAA-eligible backend (not in prototype)","todo"],["Signed BAA with vendors","Not in place — consumer API is not BAA-covered","todo"],["Breach notification plan","Define before production","todo"]];
  return (<div className="grid" style={{gridTemplateColumns:"1fr"}}>
    <div className="banner sec">{I.shield}<span><b>HIPAA-aware prototype.</b> The controls below model the safeguards a compliant system needs. Items marked “to build” require a backend and legal agreements before any real PHI is handled. Note: HIPAA is U.S.-specific — in Australia the governing framework is the <b>Privacy Act 1988 / Australian Privacy Principles</b>, overseen by the OAIC.</span></div>
    <div className="grid" style={{gridTemplateColumns:"repeat(auto-fit,minmax(240px,1fr))"}}>
      {controls.map(([t,d,s])=>(<div className="card" style={{padding:16}} key={t}>
        <div className="row" style={{justifyContent:"space-between"}}><b style={{fontSize:13.5}}>{t}</b><span className={"chip "+(s==="ok"?"":"sig")}>{s==="ok"?"✓ active":"to build"}</span></div>
        <p className="muted" style={{fontSize:12.5,margin:"6px 0 0"}}>{d}</p></div>))}
    </div>
    <div className="card" style={{padding:18}}>
      <div className="eyebrow" style={{marginBottom:6}}>Connector compliance</div>
      <p className="muted" style={{fontSize:13}}>Before going live, each external connection in API connections must carry a data-processing/BAA agreement. Currently connected: {Object.entries(conns).filter(([,v])=>v).map(([k])=>k).join(", ")||"none"}.</p>
    </div>
  </div>);
}

/* ---------------- API connections ---------------- */
function Connections({conns,setConns,logAudit}){
  const list=[["agents","AI Agent Fleet","Anthropic API — discovery, ratings & journey agents","Live in Claude preview"],["fhir","EHR / FHIR","Sync patient records via FHIR R4","Configure endpoint"],["stripe","Stripe Billing","Subscriptions & invoices","Add secret key (backend)"],["transplant","Transplant authority","Route donor consent to national body","Per-region API"],["sso","Identity / SSO","SAML / OAuth sign-in","Connect IdP"]];
  const toggle=k=>{setConns(c=>({...c,[k]:!c[k]}));logAudit("connector toggled",k,1);};
  return (<div className="grid" style={{gridTemplateColumns:"1fr"}}>
    <div className="banner info">{I.plug}<span>The app is API-driven. The agent fleet is live here; other connectors are scaffolding — wire real endpoints + secrets in your backend before production.</span></div>
    <div className="grid" style={{gridTemplateColumns:"repeat(auto-fit,minmax(260px,1fr))"}}>
      {list.map(([k,nm,desc,hint])=>(<div className="card" style={{padding:16}} key={k}>
        <div className="row" style={{justifyContent:"space-between"}}><b style={{fontSize:14}}>{nm}</b><span className={"chip "+(conns[k]?"":"gray")}>{conns[k]?"● connected":"○ off"}</span></div>
        <p className="muted" style={{fontSize:12.5,margin:"6px 0 10px"}}>{desc}</p>
        <input className="txt" style={{marginBottom:10,fontSize:12}} placeholder={hint} disabled={k==="agents"} defaultValue={k==="agents"?"https://api.anthropic.com/v1/messages":""}/>
        <button className={"btn sm "+(conns[k]?"ghost":"")} onClick={()=>toggle(k)} disabled={k==="agents"}>{k==="agents"?"Managed":conns[k]?"Disconnect":"Connect"}</button>
      </div>))}
    </div>
  </div>);
}

/* ---------------- Audit log ---------------- */
function AuditLog({audit}){
  return (<div className="grid" style={{gridTemplateColumns:"1fr"}}>
    <div className="banner info">{I.list}<span>Append-only access trail. In production this writes to a tamper-evident store with retention controls.</span></div>
    <div className="card" style={{padding:0,overflow:"auto"}}>
      <table className="tbl"><thead><tr><th>Time</th><th>Actor</th><th>Action</th><th>Target</th><th>Class</th></tr></thead>
        <tbody>{audit.map((a,i)=>(<tr key={i}><td className="mono" style={{fontSize:11,color:"var(--mist)"}}>{a.t}</td><td className="mono" style={{fontSize:12}}>{a.actor}</td><td>{a.action}</td><td className="muted">{a.target}</td><td><span className={`lv lv${a.lv}`}>{LV[a.lv][0]}</span></td></tr>))}</tbody></table>
    </div>
  </div>);
}

/* ---------------- Subscribers ---------------- */
function Subscribers({patients}){
  return (<div className="card" style={{padding:0,overflow:"auto"}}>
    <table className="tbl"><thead><tr><th>Subscriber</th><th>Region</th><th>Plan</th><th>MRN</th><th>Status</th></tr></thead>
      <tbody>{patients.map(p=>(<tr key={p.id}><td><b>{p.name}</b></td><td>{p.region}</td><td><span className="chip">{PLANS.find(x=>x.id===p.plan)?.name||p.plan}</span></td><td className="mono" style={{fontSize:12}}>{p.mrn}</td><td>{p.status}</td></tr>))}</tbody></table>
  </div>);
}

/* ---------------- Subscription ---------------- */
function Subscription({plan,setPlan,logAudit}){
  return (<div className="grid" style={{gridTemplateColumns:"1fr"}}>
    <div className="card" style={{padding:18}}><div className="eyebrow">Current plan</div><div className="h2">{PLANS.find(p=>p.id===plan).name} · {PLANS.find(p=>p.id===plan).price}{PLANS.find(p=>p.id===plan).per||""}</div><p className="muted" style={{fontSize:12.5,marginTop:6}}>Change anytime. Real billing needs a Stripe backend — this updates entitlements instantly for the demo.</p></div>
    <div className="plans">{PLANS.map(p=>(<div className={"plan"+(p.id===plan?" cur":"")} key={p.id}>
      <div className="pn">{p.name}</div><div className="muted" style={{fontSize:12}}>{p.tagline}</div>
      <div className="pp">{p.price}<small>{p.per||""}</small></div>
      <ul>{p.feat.map(f=><li key={f}>{f}</li>)}</ul>
      {p.id===plan?<button className="btn ghost" disabled>Current plan</button>:<button className="btn" onClick={()=>{setPlan(p.id);logAudit("plan changed",p.name,1);}}>{p.id==="explorer"?"Switch":"Upgrade"} to {p.name}</button>}
    </div>))}</div>
    <div className="muted" style={{fontSize:11,textAlign:"center"}}>Prices illustrative (AUD). Payment, proration and invoicing require a billing provider in production.</div>
  </div>);
}

/* ---------------- Gate ---------------- */
function Gate({feature,need,onUp}){
  return (<div className="gate"><div className="lock">{I.lock}</div><div className="h2" style={{fontSize:18}}>{feature} is a {need} feature</div>
    <p className="muted" style={{fontSize:13,maxWidth:420,margin:"8px auto 16px"}}>Upgrade your subscription to unlock this. You can switch plans instantly in the demo.</p>
    <button className="btn" onClick={onUp}>{I.card} View plans</button></div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));

var _b=document.getElementById("boot"); if(_b) _b.remove();
</script>
</body>
</html>
